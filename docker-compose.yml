version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: sentinel_mongodb
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: sentinel_minio
    restart: always
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  mongo_data:
    driver: local
  minio_data:
    driver: local
